server.port=8081
spring.application.name=user-service

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8765/login/oauth2/code/google

# Enable support for X-Forwarded-* headers (Host, Port, Proto) from the API Gateway.
# This ensures that OAuth2 redirect URIs are generated using the standard Gateway address (localhost:8765)
# instead of the internal service address (localhost:8081).
server.forward-headers-strategy=framework

# Eureka Configuration
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

#JWT Config
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

#Rabbit MQ
# Connection — env vars supplied by docker-compose in production, fallback to local defaults
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:admin123}

# User-lifecycle exchange/queue/routing-key — referenced by RabbitMQConfig
rabbitmq.user.exchange=user.exchange
rabbitmq.user.queue=user.events
rabbitmq.user.routing-key=user.registered

# Resilience4j Configuration
# Default configuration for all circuit breakers
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=5s
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.eventConsumerBufferSize=10

# Specific configuration for a circuit breaker named 'userService'
resilience4j.circuitbreaker.instances.userService.baseConfig=default

# Actuator — expose health, circuit breaker state, event log and metrics
management.endpoints.web.exposure.include=health,info,circuitbreakers,circuitbreakerevents,metrics
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

logging.level.io.github.resilience4j=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG

# Tracing Configuration
management.tracing.enabled=true
management.observations.http.server.requests.enabled=true
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]


