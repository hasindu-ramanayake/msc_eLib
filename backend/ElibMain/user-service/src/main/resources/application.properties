server.port=8081
spring.application.name=user-service

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8765/login/oauth2/code/google

# Enable support for X-Forwarded-* headers (Host, Port, Proto) from the API Gateway.
# This ensures that OAuth2 redirect URIs are generated using the standard Gateway address (localhost:8765)
# instead of the internal service address (localhost:8081).
server.forward-headers-strategy=framework

# Eureka Configuration
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true

#JWT Config
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

#Rabbit MQ
rabbitmq.exchange: notification.exchange
rabbitmq.routing-key: user.registered


logging.level.org.springframework.security.oauth2=DEBUG
