services:
  db-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  mq-test:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service-test:
    image: maven:3.9.9-eclipse-temurin-21
    volumes:
      - ..:/app
      - m2_cache:/root/.m2
    working_dir: /app/user-service
    command: mvn clean test -Dspring.profiles.active=test -Dtest=UserIntegrationTest
    depends_on:
      db-test:
        condition: service_healthy
      mq-test:
        condition: service_healthy

volumes:
  m2_cache:
