spring.application.name=ItemService-Test
server.port=8072

# Database configuration for tests (PostgreSQL in Docker)
spring.datasource.url=jdbc:postgresql://item-db-test:5432/itemdb_test
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# RabbitMQ configuration for tests
spring.rabbitmq.host=item-rabbitmq-test
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Disable Eureka for tests
eureka.client.enabled=false
