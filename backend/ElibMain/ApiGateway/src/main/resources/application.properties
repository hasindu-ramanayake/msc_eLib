eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/

spring.application.name=apigateway
server.port=8765

# SSL Configuration (Disabled for rollback)
server.ssl.enabled=false

logging.level.root=INFO
logging.level.org.springframework.cloud.gateway.server.webmvc=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG

# Discovery Client Configuration
spring.cloud.gateway.server.webmvc.discovery.locator.enabled=true
spring.cloud.gateway.server.webmvc.discovery.locator.lower-case-service-id=true

# Enable forwarded header handling
spring.cloud.gateway.server.webmvc.forwarded.enabled=true


# Manual routing configured below - using the loadbalancer for scalable architecture
spring.cloud.gateway.server.webmvc.routes[0].id=user-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://user-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/v1/users/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=CircuitBreaker=userService,fallbackUri=forward:/fallback/user-service

# OAuth2 Authentication Routing
spring.cloud.gateway.server.webmvc.routes[2].id=oauth2-login
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://user-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/oauth2/**,/login/oauth2/**
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=CircuitBreaker=userService,fallbackUri=forward:/fallback/user-service

spring.cloud.gateway.server.webmvc.routes[1].id=nNotificationService
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://NotificationService 
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/v1/notifications/**

spring.cloud.gateway.server.webmvc.routes[3].id=searchService
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://searchService
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/v1/search/**

spring.cloud.gateway.server.webmvc.routes[4].id=ItemService
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://ItemService
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/v1/item/**
spring.cloud.gateway.server.webmvc.routes[4].filters[0]=CircuitBreaker=ItemService,fallbackUri=forward:/fallback/ItemService

#Borrow Service
spring.cloud.gateway.server.webmvc.routes[5].id=borrowservice
spring.cloud.gateway.server.webmvc.routes[5].uri=lb://borrowservice
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/api/v1/borrows/**

# Swagger Aggregation
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=User Service
springdoc.swagger-ui.urls[0].url=/v3/api-docs/user-service
springdoc.swagger-ui.urls[1].name=Notification Service
springdoc.swagger-ui.urls[1].url=/v3/api-docs/NotificationService
springdoc.swagger-ui.urls[2].name=Search Service
springdoc.swagger-ui.urls[2].url=/v3/api-docs/search-service
springdoc.swagger-ui.urls[3].name=Item Service
springdoc.swagger-ui.urls[3].url=/v3/api-docs/ItemService
springdoc.swagger-ui.urls[4].name=Borrow Service
springdoc.swagger-ui.urls[4].url=/v3/api-docs/borrowservice

# OpenAPI Documentation Routes
spring.cloud.gateway.server.webmvc.routes[6].id=user-service-docs
spring.cloud.gateway.server.webmvc.routes[6].uri=lb://user-service
spring.cloud.gateway.server.webmvc.routes[6].predicates[0]=Path=/v3/api-docs/user-service
spring.cloud.gateway.server.webmvc.routes[6].filters[0]=RewritePath=/v3/api-docs/user-service, /v3/api-docs

spring.cloud.gateway.server.webmvc.routes[7].id=notification-service-docs
spring.cloud.gateway.server.webmvc.routes[7].uri=lb://NotificationService
spring.cloud.gateway.server.webmvc.routes[7].predicates[0]=Path=/v3/api-docs/NotificationService
spring.cloud.gateway.server.webmvc.routes[7].filters[0]=RewritePath=/v3/api-docs/NotificationService, /v3/api-docs

spring.cloud.gateway.server.webmvc.routes[8].id=search-service-docs
spring.cloud.gateway.server.webmvc.routes[8].uri=lb://searchService
spring.cloud.gateway.server.webmvc.routes[8].predicates[0]=Path=/v3/api-docs/search-service
spring.cloud.gateway.server.webmvc.routes[8].filters[0]=RewritePath=/v3/api-docs/search-service, /v3/api-docs

spring.cloud.gateway.server.webmvc.routes[9].id=item-service-docs
spring.cloud.gateway.server.webmvc.routes[9].uri=lb://ItemService
spring.cloud.gateway.server.webmvc.routes[9].predicates[0]=Path=/v3/api-docs/ItemService
spring.cloud.gateway.server.webmvc.routes[9].filters[0]=RewritePath=/v3/api-docs/ItemService, /v3/api-docs

spring.cloud.gateway.server.webmvc.routes[10].id=borrow-service-docs
spring.cloud.gateway.server.webmvc.routes[10].uri=lb://borrowservice
spring.cloud.gateway.server.webmvc.routes[10].predicates[0]=Path=/v3/api-docs/borrowservice
spring.cloud.gateway.server.webmvc.routes[10].filters[0]=RewritePath=/v3/api-docs/borrowservice, /v3/api-docs
