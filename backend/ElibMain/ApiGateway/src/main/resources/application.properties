eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/

spring.application.name=apigateway
server.port=8765

# SSL Configuration (Disabled for rollback)
server.ssl.enabled=false

logging.level.root=INFO
logging.level.org.springframework.cloud.gateway.server.webmvc=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG

# Discovery Client Configuration
spring.cloud.gateway.server.webmvc.discovery.locator.enabled=true
spring.cloud.gateway.server.webmvc.discovery.locator.lower-case-service-id=true

# Enable forwarded header handling
spring.cloud.gateway.server.webmvc.forwarded.enabled=true


# Manual routing configured below - using the loadbalancer for scalable architecture
spring.cloud.gateway.server.webmvc.routes[0].id=user-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://user-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/v1/users/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=CircuitBreaker=userService,fallbackUri=forward:/fallback/user-service

# OAuth2 Authentication Routing
spring.cloud.gateway.server.webmvc.routes[2].id=oauth2-login
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://user-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/oauth2/**,/login/oauth2/**
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=CircuitBreaker=userService,fallbackUri=forward:/fallback/user-service

spring.cloud.gateway.server.webmvc.routes[1].id=nNotificationService
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://NotificationService 
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/v1/notifications/**

spring.cloud.gateway.server.webmvc.routes[3].id=searchService
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://searchService
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/v1/search/**

spring.cloud.gateway.server.webmvc.routes[4].id=ItemService
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://ItemService
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/v1/item/**
spring.cloud.gateway.server.webmvc.routes[4].filters[0]=CircuitBreaker=ItemService,fallbackUri=forward:/fallback/ItemService

#Borrow Service
spring.cloud.gateway.server.webmvc.routes[5].id=borrowservice
spring.cloud.gateway.server.webmvc.routes[5].uri=lb://borrowservice
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/api/v1/borrows/**

# Tracing Configuration
management.tracing.enabled=true
spring.cloud.gateway.observability.enabled=true
# Enable automatic context propagation in reactive streams (Spring Boot 3.2+)
spring.reactor.context-propagation=auto
management.observations.http.server.requests.enabled=true
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

