spring.application.name=NotificationService
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/} #JF

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
server.port=8082

# RabbitMQ connection
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost} #JF
spring.rabbitmq.port=5672
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:admin} #JF
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:admin123} #JF

# Queue and exchange names
rabbitmq.queue.notification=notification.events
rabbitmq.exchange=notification.exchange
rabbitmq.routing-key=notification.routing-key
rabbitmq.user.queue=user.events

# Mails
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

mail.from-name=E-Library

# Twilio
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.from-number=${TWILIO_FROM_NUMBER}

# UserService
services.user-service.url=${USER_SERVICE_URL:http://localhost:8081}